<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Particle Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05050f;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            /* Prevent pull-to-refresh and pinch-zoom interfering */
            touch-action: none;
            overscroll-behavior: none;
        }

        #pw-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            /* Hide cursor only on devices that have one */
            cursor: none;
            touch-action: none;
        }

        /* On touch-only devices, restore default cursor */
        @media (hover: none) and (pointer: coarse) {
            #pw-canvas {
                cursor: default;
            }
        }

        #pw-ui {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
            /* Ensure it doesn't interfere with canvas touch */
            touch-action: auto;
        }

        /* Safe area inset for notched phones */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            #pw-ui {
                bottom: calc(32px + env(safe-area-inset-bottom));
            }
        }

        #pw-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 11px 28px;
            border-radius: 50px;
            font-size: 15px;
            cursor: pointer;
            font-family: system-ui, sans-serif;
            letter-spacing: 0.03em;
            transition: background 0.2s, border-color 0.2s;
            touch-action: auto;
        }

        #pw-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.4);
        }

        #pw-btn.listening {
            background: rgba(220, 50, 50, 0.25);
            border-color: rgba(220, 80, 80, 0.7);
            animation: pw-pulse 1s ease-in-out infinite;
        }

        @keyframes pw-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(220, 50, 50, 0.35);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(220, 50, 50, 0);
            }
        }

        #pw-status {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            font-family: system-ui, sans-serif;
            text-align: center;
            white-space: nowrap;
        }

        #pw-tip {
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            font-family: system-ui, sans-serif;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #pw-input-zone {
            display: flex;
            gap: 8px;
            align-items: center;
            touch-action: auto;
        }

        #pw-input {
            background: rgba(255, 255, 255, 0.07);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 9px 16px;
            border-radius: 50px;
            font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
            outline: none;
            width: 170px;
            font-family: system-ui, sans-serif;
            touch-action: auto;
            -webkit-appearance: none;
        }

        #pw-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #pw-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
        }

        #pw-go {
            background: rgba(255, 255, 255, 0.08);
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 9px 18px;
            border-radius: 50px;
            font-size: 13px;
            cursor: pointer;
            font-family: system-ui, sans-serif;
            touch-action: auto;
        }

        #pw-go:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        #pw-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        /* Show tap hint on touch devices */
        @media (hover: none) and (pointer: coarse) {
            #pw-hint span {
                content: 'double-tap to reset';
            }
        }

        #pw-transcript {
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.85);
            font-family: inherit;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            max-width: 400px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            min-height: 1.5em;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <canvas id="pw-canvas"></canvas>

    <div id="pw-ui">
        <div id="pw-transcript"></div>
        <div id="pw-input-zone">
            <input id="pw-input" type="text" placeholder="type a phrase here..." maxlength="100"
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>
        <div id="pw-status">interactive sphere ready</div>
        <div id="pw-tip">move finger/cursor over word to repel &bull; double-tap to reset</div>
    </div>

    <div id="pw-hint">
        <span>double-click / double-tap to reset</span>
    </div>

    <script>
        (function () {

            /* ─── Canvas setup ─────────────────────────────────────────────── */
            const canvas = document.getElementById('pw-canvas');
            const ctx = canvas.getContext('2d');
            const statusEl = document.getElementById('pw-status');
            const tipEl = document.getElementById('pw-tip');
            const pwInput = document.getElementById('pw-input');
            const transcriptEl = document.getElementById('pw-transcript');

            let W, H, CX, CY, dpr;

            function resize() {
                dpr = window.devicePixelRatio || 1;
                W = window.innerWidth;
                H = window.innerHeight;
                CX = W / 2;
                CY = H / 2;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                if (appState === 0) initSphereTargets();
            }

            let audioLevel = 0; // Disabled feature

            /* ─── Particle data (Float32Arrays for zero-GC perf) ───────────── */
            const N = 10000;
            const px = new Float32Array(N);
            const py = new Float32Array(N);
            const pz = new Float32Array(N);
            const vx = new Float32Array(N);
            const vy = new Float32Array(N);
            const vz = new Float32Array(N);
            const tx = new Float32Array(N);
            const ty = new Float32Array(N);
            const tz = new Float32Array(N);
            const ox = new Float32Array(N);
            const oy = new Float32Array(N);
            const oz = new Float32Array(N);
            const hue = new Float32Array(N);
            const phase = new Float32Array(N);

            /* ─── State ─────────────────────────────────────────────────────── */
            let appState = 0;
            // Use a clearly off-screen sentinel so the (mouseX > 0) bug is avoided
            const OFFSCREEN = -99999;
            let mouseX = OFFSCREEN;
            let mouseY = OFFSCREEN;
            let t = 0;

            // Scale repel radius to screen size for touch
            function getRepelRadius() {
                return Math.min(W, H) * 0.14;
            }
            const REPEL_FORCE = 8;
            const PHI = Math.PI * (1 + Math.sqrt(5));

            let rotX = 0, rotY = 0;
            const FOV = 550;
            const CAMERA_Z = 600;

            /* ─── Fibonacci sphere distribution (3D) ────────────────────────── */
            function initSphereTargets() {
                const baseDim = Math.min(W, H);
                const R = baseDim > 1200 ? baseDim * 0.28 : baseDim * 0.42;
                for (let i = 0; i < N; i++) {
                    const polar = Math.acos(1 - 2 * (i + 0.5) / N);
                    const azim = PHI * i;

                    ox[i] = Math.sin(polar) * Math.cos(azim) * R;
                    oy[i] = Math.sin(polar) * Math.sin(azim) * R;
                    oz[i] = Math.cos(polar) * R;

                    tx[i] = ox[i];
                    ty[i] = oy[i];
                    tz[i] = oz[i];
                }
            }

            /* ─── Particle initialisation ───────────────────────────────────── */
            function initParticles() {
                for (let i = 0; i < N; i++) {
                    px[i] = (Math.random() - 0.5) * W * 2;
                    py[i] = (Math.random() - 0.5) * H * 2;
                    pz[i] = (Math.random() - 0.5) * 1000;
                    vx[i] = vy[i] = vz[i] = 0;
                    hue[i] = (i / N) * 320 + 170;
                    phase[i] = Math.random() * Math.PI * 2;
                }
            }

            /* ─── Sample pixel positions from rendered text ─────────────────── */
            function sampleTextPositions(phrase) {
                const cW = Math.floor(W);
                const cH = Math.floor(H);
                const off = document.createElement('canvas');
                off.width = cW;
                off.height = cH;
                const c2 = off.getContext('2d');

                const words = phrase.split(' ');
                const lines = [];
                let currentLine = '';
                const maxChars = phrase.length > 25 ? 12 : 20;

                words.forEach(word => {
                    if ((currentLine + word).length > maxChars) {
                        lines.push(currentLine.trim());
                        currentLine = word + ' ';
                    } else {
                        currentLine += word + ' ';
                    }
                });
                lines.push(currentLine.trim());

                let fs = Math.min(cW * 0.72 / (maxChars * 0.5), cH * 0.50 / lines.length, 180);
                if (phrase.length > 30) fs *= 0.8;

                c2.fillStyle = '#fff';
                c2.font = `900 ${fs}px Arial Black, Arial, sans-serif`;
                c2.textAlign = 'center';
                c2.textBaseline = 'middle';

                const lineHeight = fs * 1.1;
                const startY = (cH / 2) - ((lines.length - 1) * lineHeight / 2);

                lines.forEach((line, i) => {
                    c2.fillText(line, cW / 2, startY + (i * lineHeight));
                });

                const data = c2.getImageData(0, 0, cW, cH).data;
                const pts = [];
                const step = phrase.length > 30 ? 2 : 1;

                for (let y = 0; y < cH; y += step) {
                    for (let x = 0; x < cW; x += step) {
                        if (data[(y * cW + x) * 4 + 3] > 120) {
                            pts.push(x - cW / 2 + (Math.random() - 0.5) * 0.8, y - cH / 2 + (Math.random() - 0.5) * 0.8);
                        }
                    }
                }

                for (let i = pts.length / 2 - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const ia = i * 2, ja = j * 2;
                    let tmp = pts[ia]; pts[ia] = pts[ja]; pts[ja] = tmp;
                    tmp = pts[ia + 1]; pts[ia + 1] = pts[ja + 1]; pts[ja + 1] = tmp;
                }

                return pts;
            }

            /* ─── Trigger word formation ────────────────────────────────────── */
            let formTimeout;
            function formWord(phrase, isInterim = false) {
                if (!phrase.trim()) return;

                appState = 1;
                tipEl.style.opacity = '0';
                statusEl.textContent = isInterim ? 'capturing...' : 'sentence active';

                const pts = sampleTextPositions(phrase);
                const pCount = pts.length / 2;

                for (let i = 0; i < N; i++) {
                    const idx = (i % pCount) * 2;
                    tx[i] = pts[idx];
                    ty[i] = pts[idx + 1];
                    tz[i] = 0;
                }

                rotY = 0;
                t = 0;
                clearTimeout(formTimeout);
                if (!isInterim) {
                    formTimeout = setTimeout(() => {
                        appState = 2;
                        statusEl.textContent = 'move finger / cursor to repel';
                        tipEl.style.opacity = '1';
                    }, 2000);
                }
            }

            /* ─── Physics update ────────────────────────────────────────────── */
            function update() {
                t += 0.005;
                if (appState === 0) rotY += 0.006;

                const jitter = appState === 0 ? 1.8 : 0;
                const REPEL_RADIUS = getRepelRadius();
                const interacting = mouseX !== OFFSCREEN;

                for (let i = 0; i < N; i++) {
                    let curTx = tx[i], curTy = ty[i], curTz = tz[i];

                    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);

                    let targetX = curTx * cosY - curTz * sinY;
                    let targetY = curTy;
                    let targetZ = curTx * sinY + curTz * cosY;

                    if (appState === 0) {
                        targetX += Math.sin(t * 8 + phase[i]) * jitter;
                        targetY += Math.cos(t * 9 + phase[i]) * jitter;
                        targetZ += Math.sin(t * 7 + phase[i] * 2) * jitter;
                    }

                    const sp = appState === 0 ? 0.02 : 0.022;
                    vx[i] += (targetX - px[i]) * sp;
                    vy[i] += (targetY - py[i]) * sp;
                    vz[i] += (targetZ - pz[i]) * sp;

                    // Repulsion — works for both mouse and touch
                    if (appState >= 1 && interacting) {
                        const scale = FOV / (FOV + pz[i] + CAMERA_Z);
                        const sx = px[i] * scale + CX;
                        const sy = py[i] * scale + CY;

                        const rdx = sx - mouseX;
                        const rdy = sy - mouseY;
                        const d2 = rdx * rdx + rdy * rdy;
                        if (d2 < REPEL_RADIUS * REPEL_RADIUS && d2 > 1) {
                            const d = Math.sqrt(d2);
                            const mag = REPEL_FORCE * (1 - d / REPEL_RADIUS) * 5;
                            vx[i] += (rdx / d) * mag;
                            vy[i] += (rdy / d) * mag;
                        }
                    }

                    vx[i] *= 0.82;
                    vy[i] *= 0.82;
                    vz[i] *= 0.82;

                    px[i] += vx[i];
                    py[i] += vy[i];
                    pz[i] += vz[i];
                }
            }

            /* ─── Render ────────────────────────────────────────────────────── */
            function draw() {
                ctx.fillStyle = 'rgba(5,5,15,0.22)';
                ctx.fillRect(0, 0, W, H);

                const interacting = mouseX !== OFFSCREEN;
                const REPEL_RADIUS = getRepelRadius();

                for (let i = 0; i < N; i++) {
                    const zPos = pz[i] + CAMERA_Z;
                    if (zPos < 10) continue;

                    const scale = FOV / zPos;
                    const sx = px[i] * scale + CX;
                    const sy = py[i] * scale + CY;

                    const spd = Math.sqrt(vx[i] * vx[i] + vy[i] * vy[i] + vz[i] * vz[i]);
                    let a = Math.min(1, (0.18 + spd * 0.1) * (scale * 0.65));
                    let size = (0.4 + spd * 0.12) * scale;
                    let h, s, l;

                    if (appState >= 1) {
                        h = 190;
                        s = 90;
                        l = 85;
                        a = Math.min(1, a * 1.5);
                        size *= 0.9;
                    } else {
                        h = (hue[i] + t * 25) % 360;
                        s = 80;
                        l = 70;
                    }

                    ctx.beginPath();
                    ctx.arc(sx, sy, size, 0, 6.2832);
                    ctx.fillStyle = `hsla(${h}, ${s}%, ${l}%, ${a})`;
                    ctx.fill();
                }

                // Draw repel glow around pointer/finger
                if (appState >= 1 && interacting) {
                    const r = REPEL_RADIUS;
                    const grd = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, r);
                    grd.addColorStop(0, 'rgba(255,255,255,0.05)');
                    grd.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.beginPath();
                    ctx.arc(mouseX, mouseY, r, 0, 6.2832);
                    ctx.fillStyle = grd;
                    ctx.fill();
                }
            }

            /* ─── Main loop ─────────────────────────────────────────────────── */
            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            /* ─── Reset helper ───────────────────────────────────────────────── */
            function resetToSphere() {
                appState = 0;
                initSphereTargets();
                statusEl.textContent = 'interactive sphere ready';
                tipEl.style.opacity = '0';
                pwInput.value = '';
                transcriptEl.textContent = '';
            }

            /* ─── Mouse events ───────────────────────────────────────────────── */
            canvas.addEventListener('mousemove', e => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            canvas.addEventListener('mouseleave', () => {
                mouseX = OFFSCREEN;
                mouseY = OFFSCREEN;
            });

            canvas.addEventListener('dblclick', resetToSphere);

            /* ─── Touch events ───────────────────────────────────────────────── */
            // Track the primary touch for repulsion
            canvas.addEventListener('touchstart', e => {
                // Prevent scrolling / default browser gestures on canvas
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            }, { passive: false });

            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            }, { passive: false });

            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                // Remove the pointer so repulsion stops when finger lifts
                mouseX = OFFSCREEN;
                mouseY = OFFSCREEN;
            }, { passive: false });

            canvas.addEventListener('touchcancel', () => {
                mouseX = OFFSCREEN;
                mouseY = OFFSCREEN;
            });

            /* ─── Double-tap to reset (touch) ────────────────────────────────── */
            let lastTap = 0;
            canvas.addEventListener('touchend', e => {
                const now = Date.now();
                if (now - lastTap < 350) {
                    resetToSphere();
                }
                lastTap = now;
            }, { passive: true });

            /* ─── Text input ─────────────────────────────────────────────────── */
            pwInput.addEventListener('input', () => {
                const s = pwInput.value.trim();
                if (s) {
                    transcriptEl.textContent = s;
                    formWord(s, true);
                } else {
                    transcriptEl.textContent = '';
                    initSphereTargets();
                    appState = 0;
                    statusEl.textContent = 'interactive sphere ready';
                }
            });

            // Pressing Enter on mobile keyboard confirms the word
            pwInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.target.blur(); // dismiss keyboard
                    const s = pwInput.value.trim();
                    if (s) formWord(s, false);
                }
            });

            /* ─── Boot ──────────────────────────────────────────────────────── */
            resize();
            initParticles();
            loop();

            window.addEventListener('resize', () => {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                resize();
            });

        })();
    </script>
</body>

</html>
